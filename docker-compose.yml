version: '3.8'

services:
  # Node.js API Server
  api:
    build:
      context: ./artifacts/api-server
      dockerfile: Dockerfile
    container_name: statyx-api
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: 3002
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - python-backend
    restart: unless-stopped
    networks:
      - statyx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/streamlit-url"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python FastAPI Backend
  python-backend:
    build:
      context: ./artifacts/streamlit-app
      dockerfile: Dockerfile
    container_name: statyx-python
    ports:
      - "8502:8502"
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    networks:
      - statyx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: statyx-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./artifacts/statyx-ai/dist/public:/usr/share/nginx/html/app:ro
      - ./artifacts/mockup-sandbox/dist:/usr/share/nginx/html/mockup:ro
      - ./nginx-ssl:/etc/nginx/ssl:ro  # For HTTPS certificates
    depends_on:
      - api
      - python-backend
    restart: unless-stopped
    networks:
      - statyx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/streamlit-url"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  statyx-network:
    driver: bridge
